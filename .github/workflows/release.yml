name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Mirrors ci.yml's verify job (minus the build-all-targets step).
    # Keep in sync when changing test commands there.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Set up Chrome (for wasm tests)
        uses: browser-actions/setup-chrome@v1

      - name: Static analysis
        run: ./gradlew detekt --stacktrace

      - name: Unit tests (JVM, Android, wasm)
        run: ./gradlew :sharedLogic:jvmTest :androidApp:testDebugUnitTest :sharedLogic:wasmJsTest --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Build signed release & publish
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > "${{ runner.temp }}/release-key.jks"

      - name: Build signed release & debug APKs
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease :androidApp:assembleDebug --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release-key.jks"

      - name: Rename APKs & R8 mapping
        run: |
          mv androidApp/build/outputs/apk/debug/androidApp-debug.apk androidApp/build/outputs/apk/debug/conver-${{ github.ref_name }}-debug.apk
          mv androidApp/build/outputs/apk/release/androidApp-release.apk androidApp/build/outputs/apk/release/conver-${{ github.ref_name }}-release.apk
          gzip -c androidApp/build/outputs/mapping/release/mapping.txt > "androidApp/build/outputs/mapping/release/conver-${{ github.ref_name }}-release-mapping.txt.gz"

      # Creates the release object (with generated notes); the desktop & web jobs
      # upsert their files into it. generate_release_notes only applies on first creation.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          # The R8 mapping is published too (safe: OSS repo) so crash traces decode.
          files: |
            androidApp/build/outputs/apk/debug/conver-${{ github.ref_name }}-debug.apk
            androidApp/build/outputs/apk/release/conver-${{ github.ref_name }}-release.apk
            androidApp/build/outputs/mapping/release/conver-${{ github.ref_name }}-release-mapping.txt.gz
          fail_on_unmatched_files: true

  desktop:
    name: Desktop installers
    needs: [test, release]
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Package native distribution
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ./gradlew :desktopApp:packageReleaseDistributionForCurrentOS -PdesktopVersion="$VERSION" --stacktrace

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find desktopApp/build/compose/binaries -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.exe' \) \
            -exec cp {} dist/ \;

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*
          fail_on_unmatched_files: true

  web-build:
    name: Web bundle
    needs: [test, release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Build wasm distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution --stacktrace

      - name: Zip the bundle
        run: |
          cd webApp/build/dist/wasmJs/productionExecutable
          zip -r "$GITHUB_WORKSPACE/conver-${{ github.ref_name }}-web.zip" .

      - name: Attach zip to release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: conver-${{ github.ref_name }}-web.zip
          fail_on_unmatched_files: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webApp/build/dist/wasmJs/productionExecutable

  web-deploy:
    name: Deploy web to Pages
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
