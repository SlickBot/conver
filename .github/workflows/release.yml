name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      # Gate everything on a strict vMAJOR.MINOR.PATCH tag so a malformed tag can
      # never half-publish (jpackage/MSI rejects anything that isn't 3 numeric parts).
      - name: Enforce vMAJOR.MINOR.PATCH
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' must be vMAJOR.MINOR.PATCH (e.g. v1.2.3)."
            exit 1
          fi
          # Bare version (no leading v) for jpackage's -PdesktopVersion. Computed once here.
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  test:
    name: Unit tests
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Mirrors ci.yml's verify job (minus the build-all-targets step).
    # Keep in sync when changing test commands there.
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Set up Chrome (for wasm tests)
        uses: browser-actions/setup-chrome@v2

      - name: Static analysis
        run: ./gradlew detekt --stacktrace

      - name: Unit tests (JVM, Android, wasm)
        run: ./gradlew :sharedLogic:jvmTest :androidApp:testDebugUnitTest :sharedLogic:wasmJsTest --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14

  # ---- Platform builds: fan out in parallel after tests, artifact-only.
  #      None of these touch the GitHub Release - that avoids concurrent writers.

  android:
    name: Android APKs
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Decode keystore
        run: |
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > "${{ runner.temp }}/release-key.jks"

      - name: Build signed release & debug APKs
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease :androidApp:assembleDebug --stacktrace

      - name: Remove keystore
        if: always()
        run: rm -f "${{ runner.temp }}/release-key.jks"

      - name: Stage release artifacts
        run: |
          mkdir -p staging
          mv androidApp/build/outputs/apk/debug/androidApp-debug.apk staging/conver-${{ github.ref_name }}-debug.apk
          mv androidApp/build/outputs/apk/release/androidApp-release.apk staging/conver-${{ github.ref_name }}-release.apk
          # The R8 mapping is published too (safe: OSS repo) so crash traces decode.
          gzip -c androidApp/build/outputs/mapping/release/mapping.txt > staging/conver-${{ github.ref_name }}-release-mapping.txt.gz

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: staging/
          if-no-files-found: error

  desktop:
    name: Desktop installers
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Package native distribution
        shell: bash
        run: |
          ./gradlew :desktopApp:packageReleaseDistributionForCurrentOS -PdesktopVersion="${{ needs.validate.outputs.version }}" --stacktrace

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          find desktopApp/build/compose/binaries -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.rpm' -o -name '*.exe' \) \
            -exec cp {} dist/ \;

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          # Per-OS name: upload-artifact requires unique names across matrix legs.
          name: release-desktop-${{ matrix.os }}
          path: dist/
          if-no-files-found: error

  web-build:
    name: Web bundle
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Build wasm distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution --stacktrace

      - name: Zip the bundle
        run: |
          mkdir -p staging
          cd webApp/build/dist/wasmJs/productionExecutable
          zip -r "$GITHUB_WORKSPACE/staging/conver-${{ github.ref_name }}-web.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-web
          path: staging/
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: webApp/build/dist/wasmJs/productionExecutable

  # ---- Single terminal writer: one Release object, created once from all artifacts.

  create-release:
    name: Publish GitHub Release
    needs: [android, desktop, web-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Pull every platform's artifacts (but not test-reports) into one flat dir.
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-files
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
          fail_on_unmatched_files: true

  # Pages deploy is independent of the Release; it only needs the pages artifact.
  web-deploy:
    name: Deploy web to Pages
    needs: web-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
