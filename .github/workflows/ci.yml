name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, test & build all targets
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up build environment
        uses: ./.github/actions/setup

      - name: Set up Chrome (for wasm tests)
        uses: browser-actions/setup-chrome@v1

      - name: Static analysis
        run: ./gradlew detekt --stacktrace

      - name: Unit tests (JVM, Android, wasm)
        run: ./gradlew :sharedLogic:jvmTest :androidApp:testDebugUnitTest :sharedLogic:wasmJsTest --stacktrace

      - name: Build all shipping targets
        run: ./gradlew :androidApp:assembleDebug :desktopApp:jvmJar :webApp:wasmJsBrowserDistribution --stacktrace

      - name: Upload test reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore
          retention-days: 14
